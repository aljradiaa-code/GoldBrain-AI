name: MVT-VRL Auto Training

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install tensorflow==2.15.0 numpy pandas scikit-learn

      - name: Run Training Script
        run: |
          python scripts/train_model.py
        continue-on-error: false

      - name: Commit updated model
        run: |
          git config --global user.name "MVT-VRL Bot"
          git config --global user.email "bot@mvt-vrl.ai"
          git add models/ gold_brain_weights.keras || true
          git status
          git diff --staged --quiet || git commit -m "[MVT-VRL] Model updated $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main || git push origin HEAD
