name: GoldBrain Train & Export

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install tensorflow==2.13.0 tensorflowjs==4.10.0 pandas numpy

      - name: Run training
        run: python scripts/train_model.py

      - name: Commit model
        run: |
          git config user.name "GoldBrain Bot"
          git config user.email "bot@goldbrain.ai"
          git add models/
          git add gold_brain_weights.keras || true
          git diff --quiet && git diff --staged --quiet ||             git commit -m "Update model $(date '+%Y-%m-%d %H:%M')"
          git push
